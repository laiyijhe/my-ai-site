name: HereForGrant Daily Crawler

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 這是黑魔法：自動尋找任何目錄下的 requirements.txt 並安裝
        find . -name "requirements.txt" -exec pip install -r {} +
        python -m playwright install --with-deps chromium

    - name: Run Crawler
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        # 自動尋找 crawler.py，切換到該目錄並執行
        CRAWLER_FILE=$(find . -name "crawler.py" | head -n 1)
        CRAWLER_DIR=$(dirname "$CRAWLER_FILE")
        echo "Found crawler at: $CRAWLER_FILE"
        cd "$CRAWLER_DIR"
        python crawler.py
